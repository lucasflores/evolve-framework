# === DEV-STACK:BEGIN:HOOKS ===
repos:
  - repo: local
    hooks:
      - id: dev-stack-pipeline
        name: dev-stack pipeline
        entry: dev-stack pipeline run
        language: system
        pass_filenames: false
        stages: [commit]
      - id: dev-stack-ruff
        name: ruff lint
        entry: ruff check
        language: system
        pass_filenames: true
        stages: [commit]
      - id: dev-stack-pytest
        name: pytest quick suite
        entry: pytest -q
        language: system
        pass_filenames: false
        stages: [commit]
      - id: dev-stack-mypy
        name: mypy type check
        entry: python3 -m mypy evolve/
        language: system
        pass_filenames: false
        types: [python]
        stages: [commit]
# === DEV-STACK:END:HOOKS ===
