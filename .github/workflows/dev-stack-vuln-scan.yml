name: Dev Stack Scheduled Vulnerability Scan

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    # Cloud justification: Scheduled dependency scans rely on always-on runners with up-to-date vulnerability feeds (FR-032).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit detect-secrets

      - name: pip-audit
        run: pip-audit --progress-spinner off --format cyclonedx-json > pip-audit.json

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json

  container-scan:
    runs-on: ubuntu-latest
    needs: dependency-audit
    # Cloud justification: Container scanning needs privileged runners with continuously-updated CVE databases (FR-032).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          format: sarif
          output: trivy.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
