name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Core tests (no optional deps) ──────────────────────────────────
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --cov=evolve --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ── PyTorch backend tests ──────────────────────────────────────────
  test-pytorch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,pytorch]"

      - name: Run PyTorch tests
        run: |
          pytest tests/benchmarks/test_cpu_gpu_equivalence.py \
                 tests/benchmarks/test_scaling.py \
                 tests/integration/test_soft_prompt_decoder.py \
                 -v -k "not cuda and not CUDA"

  # ── JAX backend tests ──────────────────────────────────────────────
  test-jax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,jax]"

      - name: Run JAX tests
        run: |
          pytest tests/benchmarks/test_cpu_gpu_equivalence.py \
                 tests/benchmarks/test_scaling.py \
                 -v -k "jax or JAX"

  # ── RL tests ───────────────────────────────────────────────────────
  test-rl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,rl]"

      - name: Run RL tests
        run: |
          pytest tests/integration/test_rl_evolution.py -v

  # ── Tutorial & notebook tests ──────────────────────────────────────
  test-tutorials:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tutorials]" pytest-timeout
          python -m ipykernel install --user --name python3

      - name: Run tutorial tests
        run: |
          pytest tests/tutorials/ \
                 tests/integration/test_tutorial_06_erp.py \
                 -v --timeout=600

  # ── Lint & typecheck ───────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check evolve/ tests/

      - name: Run mypy
        run: mypy evolve/ --config-file pyproject.toml

  # ── Verify no ML imports in core modules (Constitution requirement) ─
  verify-no-ml-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for ML framework imports in core modules
        run: |
          # Check that core modules don't import ML frameworks
          CORE_MODULES="evolve/core evolve/representation evolve/evaluation evolve/multiobjective evolve/diversity"
          for module in $CORE_MODULES; do
            if [ -d "$module" ]; then
              if grep -rE "^(import|from)\s+(torch|jax|tensorflow|keras)" "$module" --include="*.py"; then
                echo "ERROR: ML framework import found in $module"
                exit 1
              fi
            fi
          done
          echo "✓ No ML framework imports in core modules"
